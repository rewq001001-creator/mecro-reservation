name: Reservation Bot

on:
  schedule:
    - cron: "0,5,10,15,20,25,30 23 * * *"
  workflow_dispatch:

jobs:
  reserve:
    concurrency:
      group: reservation-bot-main
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run reservation bot
        run: npm run run:reservation

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reservation-logs
          path: logs
          if-no-files-found: warn
